<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>李氏家谱 - 统计</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%238B0000'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-size='60' font-weight='bold' fill='%23FFD700' font-family='serif'%3E%E6%9D%8E%3C/text%3E%3C/svg%3E">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <div class="brand-icon">李</div>
      <span>李氏家谱</span>
    </a>
    <button class="hamburger-menu" id="hamburgerBtn" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <ul class="navbar-nav" id="navLinks">
      <li><a href="index.html" data-page="dashboard">首页</a></li>
      <li><a href="members.html" data-page="members">成员</a></li>
      <li><a href="tree.html" data-page="tree">家族树</a></li>
      <li><a href="memorial.html" data-page="memorial">祭奠堂</a></li>
      <li><a href="messages.html" data-page="messages">留言</a></li>
      <li><a href="mottos.html" data-page="mottos">家训</a></li>
      <li><a href="notices.html" data-page="notices">公告</a></li>
      <li><a href="stats.html" data-page="stats" class="active">统计</a></li>
      <li><a href="settings.html" data-page="settings">⚙️ 设置</a></li>
    </ul>
  </nav>

  <div class="main-content">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon red">族</div>
        <div class="stat-info">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">家族总人数</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">男</div>
        <div class="stat-info">
          <div class="stat-value" id="statMale">0</div>
          <div class="stat-label">男性</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon pink">女</div>
        <div class="stat-info">
          <div class="stat-value" id="statFemale">0</div>
          <div class="stat-label">女性</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">生</div>
        <div class="stat-info">
          <div class="stat-value" id="statAlive">0</div>
          <div class="stat-label">在世</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">故</div>
        <div class="stat-info">
          <div class="stat-value" id="statDeceased">0</div>
          <div class="stat-label">已故</div>
        </div>
      </div>
    </div>
    <div class="card chart-section">
      <div class="card-title" style="font-size:0.95rem;margin-bottom:12px;">世代分布</div>
      <div class="bar-chart"><canvas id="genBar"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">数据管理</div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn-secondary" id="btnExportJSON">导出 JSON</button>
        <button class="btn btn-outline" onclick="document.getElementById('importFile').click()">导入数据</button>
        <button class="btn btn-danger btn-sm" id="btnResetData" style="margin-left:auto;">重置数据</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">操作日志</div>
        <button class="btn btn-ghost btn-sm" id="btnClearLogs" style="color:var(--danger);">清空日志</button>
      </div>
      <div class="log-list" id="logList"></div>
    </div>
  </div>
<!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- 页脚 -->
  <div class="footer">
    <span>访问量 <span id="localPv">0</span> 次</span>
    <span style="margin-left:12px;">访客数 <span id="localUv">0</span> 人</span>
    李氏家谱 · 慎终追远 · 数据存储于浏览器本地 · 建议定期导出备份
  </div>
<script src="js/github-api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
